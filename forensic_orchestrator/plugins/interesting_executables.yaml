interesting_executables:
  - id: sdelete
    label: Sysinternals SDelete
    category: secure_deletion_wiping
    severity: high
    filenames:
      - sdelete.exe
      - sdelete64.exe
      - sdelete64a.exe
    name_contains:
      - sdelete
    description: Sysinternals secure deletion and free-space wiping utility.

  - id: eraser
    label: Eraser
    category: secure_deletion_wiping
    severity: high
    filenames:
      - eraser.exe
      - eraserd.exe
      - eraserl.exe
    name_contains:
      - eraser
    description: Secure deletion utility.

  - id: ccleaner
    label: CCleaner
    category: cleanup_privacy
    severity: medium
    filenames:
      - ccleaner.exe
      - ccleaner64.exe
    name_contains:
      - ccleaner
    description: System cleanup/privacy utility that can remove user activity traces.

  - id: bleachbit

  RECmd:
    enabled: true
    type: dotnet
    executable: /opt/eztools/RECmd/RECmd.dll
    artifacts:
      - name: registry_system
        source: "WINDOWS/system32/config/SYSTEM"
        destination: "registry/SYSTEM"
      - name: registry_system_log1
        source: "WINDOWS/system32/config/SYSTEM.LOG1"
        destination: "registry/SYSTEM.LOG1"
        optional: true
      - name: registry_system_log2
        source: "WINDOWS/system32/config/SYSTEM.LOG2"
        destination: "registry/SYSTEM.LOG2"
        optional: true
      - name: registry_software
        source: "WINDOWS/system32/config/SOFTWARE"
        destination: "registry/SOFTWARE"
      - name: registry_software_log1
        source: "WINDOWS/system32/config/SOFTWARE.LOG1"
        destination: "registry/SOFTWARE.LOG1"
        optional: true
      - name: registry_software_log2
        source: "WINDOWS/system32/config/SOFTWARE.LOG2"
        destination: "registry/SOFTWARE.LOG2"
        optional: true
      - name: registry_security
        source: "WINDOWS/system32/config/SECURITY"
        destination: "registry/SECURITY"
      - name: registry_security_log1
        source: "WINDOWS/system32/config/SECURITY.LOG1"
        destination: "registry/SECURITY.LOG1"
        optional: true
      - name: registry_security_log2
        source: "WINDOWS/system32/config/SECURITY.LOG2"
        destination: "registry/SECURITY.LOG2"
        optional: true
      - name: registry_sam
        source: "WINDOWS/system32/config/SAM"
        destination: "registry/SAM"
      - name: registry_sam_log1
        source: "WINDOWS/system32/config/SAM.LOG1"
        destination: "registry/SAM.LOG1"
        optional: true
      - name: registry_sam_log2
        source: "WINDOWS/system32/config/SAM.LOG2"
        destination: "registry/SAM.LOG2"
        optional: true
      - name: registry_ntuser
        source: "Users"
        destination: "registry/users"
        recursive: true
        patterns:
          - "NTUSER.DAT"
          - "UsrClass.dat"
      - name: registry_user_logs
        source: "Users"
        destination: "registry/users"
        recursive: true
        patterns:
          - "NTUSER.DAT.LOG1"
          - "NTUSER.DAT.LOG2"
          - "ntuser.dat.LOG1"
          - "ntuser.dat.LOG2"
          - "UsrClass.dat.LOG1"
          - "UsrClass.dat.LOG2"
          - "usrclass.dat.LOG1"
          - "usrclass.dat.LOG2"
    command:
      - dotnet
      - "{executable}"
      - "-d"
      - "{artifact_parent:registry_system}"
      - "--bn"
      - "{plugins}/recmd_windows_activity.reb"
      - "--csv"
      - "{output}"
      - "--csvf"
      - "RECmd_WindowsActivity.csv"
    required_paths:
      - "{artifact_parent:registry_system}"
      - "{plugins}/recmd_windows_activity.reb"
    outputs:
      - csv


tools:
  MFTECmd:
    enabled: true
    type: dotnet
    executable: /opt/eztools/MFTECmd/MFTECmd.dll
    artifacts:
      - name: MFT
        source: "$MFT"
        inode: "0"
        destination: "$MFT"
        process_in_place: true
    command:
      - dotnet
      - "{executable}"
      - "-f"
      - "{artifact:MFT}"
      - "--csv"
      - "{output}"
    required_paths:
      - "{artifact:MFT}"
    outputs:
      - csv

  MFTECmdUSN:
    enabled: true
    type: dotnet
    executable: /opt/eztools/MFTECmd/MFTECmd.dll
    artifacts:
      - name: MFT
        source: "$MFT"
        inode: "0"
        destination: "$MFT"
        process_in_place: true
      - name: UsnJrnlJ
        source: "$Extend/$UsnJrnl:$J"
        destination: "$Extend/$J"
    command:
      - dotnet
      - "{executable}"
      - "-f"
      - "{artifact:UsnJrnlJ}"
      - "-m"
      - "{artifact:MFT}"
      - "--csv"
      - "{output}"
      - "--csvf"
      - "USNJrnl.csv"
    required_paths:
      - "{artifact:UsnJrnlJ}"
      - "{artifact:MFT}"
    outputs:
      - csv

  USNRewind:
    enabled: true
    type: binary
    executable: usnjrnl-forensic
    artifacts:
      - name: MFT
        source: "$MFT"
        inode: "0"
        destination: "$MFT"
        process_in_place: true
      - name: UsnJrnlJ
        source: "$Extend/$UsnJrnl:$J"
        destination: "$Extend/$J"
    command:
      - "{executable}"
      - "-j"
      - "{artifact:UsnJrnlJ}"
      - "-m"
      - "{artifact:MFT}"
      - "--csv"
      - "{output}/usn_rewind.csv"
      - "--stats"
    required_paths:
      - "{artifact:UsnJrnlJ}"
      - "{artifact:MFT}"
    outputs:
      - csv

  MFTECmdLogFile:
    enabled: true
    type: dotnet
    executable: /opt/eztools/MFTECmd/MFTECmd.dll
    artifacts:
      - name: LogFile
        source: "$LogFile"
        inode: "2"
        destination: "$LogFile"
        process_in_place: true
    command:
      - dotnet
      - "{executable}"
      - "-f"
      - "{artifact:LogFile}"
      - "--csv"
      - "{output}"
      - "--csvf"
      - "LogFile.csv"
    required_paths:
      - "{artifact:LogFile}"
    outputs:
      - csv

  NTFSParseLogFile:
    enabled: true
    type: internal_ntfs_logfile_ntfsparse
    artifacts:
      - name: LogFile
        source: "$LogFile"
        inode: "2"
        destination: "$LogFile"
        process_in_place: true
    command:
      - python3
      - logfileparse.py
      - "-f"
      - "{artifact:LogFile}"
      - "-t"
      - "csv"
      - "-e"
      - "{output}/LogFile.csv"
    required_paths:
      - "{artifact:LogFile}"
    outputs:
      - csv

  MFTECmdI30:
    enabled: true
    type: internal_ntfs_index_mftecmd
    executable: /opt/eztools/MFTECmd/MFTECmd.dll
    command:
      - dotnet
      - "{executable}"
      - "$I30-targeted"
      - "--csv"
      - "{output}"
    outputs:
      - csv

  SrumECmd:
    enabled: true
    type: dotnet
    executable: /opt/eztools/SrumECmd/SrumECmd.dll
    artifacts:
      - name: srum_dir
        source: "Windows/System32/sru"
        destination: "Windows/System32/sru"
        recursive: true
        optional: true
      - name: registry_software
        source: "WINDOWS/system32/config/SOFTWARE"
        destination: "registry/SOFTWARE"
    command:
      - dotnet
      - "{executable}"
      - "-f"
      - "{artifact:srum_dir}/SRUDB.dat"
      - "-r"
      - "{artifact:registry_software}"
      - "--csv"
      - "{output}"
    required_paths:
      - "{artifact:srum_dir}/SRUDB.dat"
      - "{artifact:registry_software}"
    outputs:
      - csv

  SrumParser:
    enabled: true
    type: internal_srum
    executable: esedbexport
    artifacts:
      - name: srum_dir
        source: "Windows/System32/sru"
        destination: "Windows/System32/sru"
        recursive: true
        optional: true
      - name: registry_software
        source: "WINDOWS/system32/config/SOFTWARE"
        destination: "registry/SOFTWARE"
        optional: true
      - name: ras_phonebooks
        source: "Users"
        destination: "vpn_phonebooks"
        recursive: true
        optional: true
        patterns:
          - "rasphone.pbk"
        include_path_patterns:
          - "*/AppData/Roaming/Microsoft/Network/Connections/Pbk*/rasphone.pbk"
          - "*/AppData/Roaming/Microsoft/Network/Connections/Pbk*/**/rasphone.pbk"
    command:
      - internal-srum-parser
      - "{artifact:srum_dir}"
      - "{output}"
    required_paths:
      - "{artifact:srum_dir}/SRUDB.dat"
    outputs:
      - csv

  UalParser:
    enabled: true
    type: internal_ual
    executable: esedbexport
    artifacts:
      - name: ual_sum_dir
        source: "Windows/System32/LogFiles/SUM"
        destination: "Windows/System32/LogFiles/SUM"
        recursive: true
        optional: true
        patterns:
          - "*.mdb"
    command:
      - internal-ual-parser
      - "{artifact:ual_sum_dir}"
      - "{output}"
    required_paths: []
    outputs:
      - csv

  SIDR:
    enabled: true
    type: binary
    executable: sidr
    artifacts:
      - name: windows_search_index
        source: "ProgramData/Microsoft/Search/Data/Applications/Windows"
        destination: "WindowsSearch/Applications/Windows"
        recursive: true
        optional: true
    command:
      - "{executable}"
      - "-f"
      - "csv"
      - "-o"
      - "{output}"
      - "{artifact:windows_search_index}"
    required_paths:
      - "{artifact:windows_search_index}"
    outputs:
      - csv

  WindowsSearchESEParser:
    enabled: true
    type: internal_windows_search_ese
    executable: esedbexport
    artifacts:
      - name: windows_search_index
        source: "ProgramData/Microsoft/Search/Data/Applications/Windows"
        destination: "WindowsSearch/Applications/Windows"
        recursive: true
        optional: true
    command:
      - internal-windows-search-ese-parser
      - "{artifact:windows_search_index}"
      - "--csv"
      - "{output}"
    required_paths: []
    outputs:
      - csv

  WindowsSearchGatherParser:
    enabled: true
    type: internal_windows_search_gather
    executable:
    artifacts:
      - name: windows_search_gather_logs
        source: "ProgramData/Microsoft/Search/Data/Applications/Windows/GatherLogs/SystemIndex"
        destination: "WindowsSearch/Applications/Windows/GatherLogs/SystemIndex"
        recursive: true
        optional: true
    command:
      - internal-windows-search-gather-parser
      - "{artifact:windows_search_gather_logs}"
      - "--csv"
      - "{output}"
    required_paths: []
    outputs:
      - csv

  WindowsErrorReportingParser:
    enabled: true
    type: internal_windows_error_reporting
    executable:
    artifacts:
      - name: windows_error_reporting
        source: "ProgramData/Microsoft/Windows/WER"
        destination: "Windows/WER"
        recursive: true
        optional: true
    command:
      - internal-windows-error-reporting-parser
      - "{artifact:windows_error_reporting}"
      - "--csv"
      - "{output}"
    required_paths: []
    outputs:
      - csv

  WindowsDefenderParser:
    enabled: true
    type: internal_windows_defender
    executable:
    artifacts:
      - name: windows_defender_service_history
        source: "ProgramData/Microsoft/Windows Defender/Scans/History/Service"
        destination: "WindowsDefender/Scans/History/Service"
        recursive: true
        optional: true
        patterns:
          - "*.log"
      - name: windows_defender_support_logs
        source: "ProgramData/Microsoft/Windows Defender/Support"
        destination: "WindowsDefender/Support"
        recursive: true
        optional: true
        patterns:
          - "*.log"
          - "*.bin"
      - name: windows_defender_cache_manager
        source: "ProgramData/Microsoft/Windows Defender/Scans/History/CacheManager"
        destination: "WindowsDefender/Scans/History/CacheManager"
        recursive: true
        optional: true
        patterns:
          - "*.bin"
      - name: windows_defender_scan_cache
        source: "ProgramData/Microsoft/Windows Defender/Scans"
        destination: "WindowsDefender/Scans"
        recursive: true
        optional: true
        patterns:
          - "mpcache-*"
          - "MpDiag.bin"
      - name: windows_defender_engine_db
        source: "ProgramData/Microsoft/Windows Defender/Scans"
        destination: "WindowsDefender/ScansEngineDb"
        recursive: true
        optional: true
        patterns:
          - "mpenginedb.db"
          - "mpenginedb.db-wal"
          - "mpenginedb.db-shm"
    command:
      - internal-windows-defender-parser
      - "{artifact:windows_defender_service_history}"
      - "--csv"
      - "{output}"
    required_paths: []
    outputs:
      - csv


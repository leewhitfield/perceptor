    executable: /opt/eztools/EvtxECmd/EvtxECmd.dll
    artifacts:
      - name: evtx_logs
        source: "Windows/System32/winevt/Logs"
        destination: "Windows/System32/winevt/Logs"
        recursive: true
        pattern: "*.evtx"
        allow_partial: true
    command:
      - dotnet
      - "{executable}"
      - "-d"
      - "{artifact:evtx_logs}"
      - "--csv"
      - "{output}"
    required_paths:
      - "{artifact:evtx_logs}"
    outputs:

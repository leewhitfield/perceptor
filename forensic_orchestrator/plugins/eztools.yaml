      - csv

  JLECmd:
    enabled: true
    type: dotnet
    executable: /opt/eztools/JLECmd/JLECmd.dll
    artifacts:
      - name: jumplists
        source: "Users"
        destination: "jumplists"
        recursive: true
        patterns:
          - "*.automaticDestinations-ms"
          - "*.customDestinations-ms"
    command:
      - dotnet
      - "{executable}"
      - "-d"
      - "{artifact:jumplists}"
      - "--csv"
      - "{output}"
    required_paths:
      - "{artifact:jumplists}"
    outputs:
      - csv

  LECmd:
    enabled: true
    type: dotnet
    executable: /opt/eztools/LECmd/LECmd.dll
    artifacts:
      - name: lnk_files
        source: "Users"
        destination: "lnk_files"
        recursive: true
        pattern: "*.lnk"
        exclude_patterns:
          - "*/Start Menu/*"
    command:
      - dotnet
      - "{executable}"
      - "-d"
      - "{artifact:lnk_files}"
      - "--csv"
      - "{output}"
    required_paths:
      - "{artifact:lnk_files}"
    outputs:
      - csv

  RBCmd:
    enabled: false
    type: dotnet
    executable: /opt/eztools/RBCmd/RBCmd.dll
    command: []
    required_paths: []
    outputs: []

  SBECmd:
    enabled: true
    type: dotnet
    executable: /opt/eztools/SBECmd/SBECmd.dll
    artifacts:
      - name: registry_ntuser
        source: "Users"
        destination: "registry/users/ntuser"
        recursive: true
        pattern: "NTUSER.DAT"
      - name: registry_ntuser_logs
        source: "Users"
        destination: "registry/users/ntuser"
        recursive: true
        patterns:
          - "NTUSER.DAT.LOG1"
          - "NTUSER.DAT.LOG2"
          - "ntuser.dat.LOG1"
          - "ntuser.dat.LOG2"
      - name: registry_usrclass
        source: "Users"
        destination: "registry/users/usrclass"
        recursive: true
        pattern: "UsrClass.dat"
      - name: registry_usrclass_logs
        source: "Users"
        destination: "registry/users/usrclass"
        recursive: true
        patterns:
          - "UsrClass.dat.LOG1"
          - "UsrClass.dat.LOG2"
          - "usrclass.dat.LOG1"
          - "usrclass.dat.LOG2"
    command:
      - dotnet
      - "{executable}"
      - "-d"
      - "{artifact_parent:registry_ntuser}"
      - "--csv"
      - "{output}"
      - "--csvf"
      - "ShellBags.csv"
    required_paths:
      - "{artifact_parent:registry_ntuser}"
    outputs:
      - csv


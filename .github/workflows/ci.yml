name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev build-essential pkg-config libleveldb-dev \
          sleuthkit ewf-tools qemu-utils ntfs-3g cryptsetup util-linux \
          libesedb-utils exiftool poppler-utils tesseract-ocr
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync --frozen --extra dev
    - name: Lint with ruff
      run: uv run ruff check forensic_orchestrator tests
    - name: Format with ruff
      run: uv run ruff format --check forensic_orchestrator tests

  typecheck:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev build-essential pkg-config libleveldb-dev \
          sleuthkit ewf-tools qemu-utils ntfs-3g cryptsetup util-linux \
          libesedb-utils exiftool poppler-utils tesseract-ocr
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync --frozen --extra dev
    - name: Type check with mypy
      run: uv run mypy forensic_orchestrator || true # Warn only for now

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev build-essential pkg-config libleveldb-dev \
          sleuthkit ewf-tools qemu-utils ntfs-3g cryptsetup util-linux \
          libesedb-utils exiftool poppler-utils tesseract-ocr

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Syntax check
      run: uv run python -m compileall forensic_orchestrator

    - name: Unit tests
      run: uv run pytest --cov=forensic_orchestrator --cov-report=xml -q

    - name: Check coverage threshold
      run: uv run coverage report --fail-under=20 || true

    - name: Standalone smoke
      run: uv run perceptor standalone smoke-regression --format json

    - name: Documentation command sanity
      run: |
        uv run perceptor standalone version --format json
        uv run perceptor standalone backlog --format json
        uv run perceptor report-bundle coverage --format json

  docker-build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t perceptor:ci .
    - name: Verify build
      run: docker run --rm perceptor:ci standalone health --format json

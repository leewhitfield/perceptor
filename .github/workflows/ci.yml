name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev build-essential pkg-config libleveldb-dev \
            sleuthkit ewf-tools qemu-utils ntfs-3g cryptsetup util-linux \
            libesedb-utils exiftool poppler-utils tesseract-ocr

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Syntax check
        run: uv run python -m compileall forensic_orchestrator

      - name: Unit tests
        run: uv run pytest -q

      - name: Standalone smoke
        run: uv run relic standalone smoke-regression --format json

      - name: Documentation command sanity
        run: |
          uv run relic standalone version --format json
          uv run relic standalone backlog --format json
          uv run relic report-bundle coverage --format json

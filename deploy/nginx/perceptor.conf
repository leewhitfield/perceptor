limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

server {
    listen 80;
    server_name _;
    
    # Optional: redirect HTTP to HTTPS if you have certs.
    # Otherwise just listen on HTTP if behind a load balancer that does TLS.
    # return 301 https://$host$request_uri;

    location /mcp/ {
        proxy_pass http://perceptor-mcp:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        limit_req zone=api burst=10 nodelay;
    }

    location /upload/ {
        proxy_pass http://perceptor-upload:8081;
        client_max_body_size 100G;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://perceptor-mcp:8080/health;
    }
}
